name: Generate 144 personality docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Generate docs
        run: python tools/generate_144_personality_docs.py
      - name: Commit generated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/144-personality-types
          if git diff --cached --quiet; then
            echo "No generated changes."
          else
            git commit -m "Generate 144 personality type documents"
            git push
          fi
